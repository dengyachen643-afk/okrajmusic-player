<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thanks. · O's 日音播放器</title>
<style>
:root{
  --bg:#eeeee7;--paper:#f8f7f2;--ink:#252722;--muted:#737568;--line:#d9d8cc;
  --sage:#a9b69c;--sage-dark:#66735f;--charcoal:#252a24;--night:#2f3a43;
  --shadow:0 24px 70px rgba(42,43,38,.14);
  --serif:"Times New Roman","Songti SC","SimSun",serif;
  --sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{
  margin:0;min-height:100vh;color:var(--ink);font-family:var(--sans);
  background:
    radial-gradient(circle at 18% 12%,rgba(169,182,156,.26),transparent 34%),
    radial-gradient(circle at 84% 18%,rgba(47,58,67,.13),transparent 28%),
    linear-gradient(135deg,#f3f2eb 0%,#e8e9e0 100%);
}
a{color:inherit}
.wrap{width:min(100% - 36px,920px);margin:0 auto;padding:56px 0 42px}
.page{
  min-height:calc(100vh - 98px);
  padding:clamp(34px,6vw,64px);
  border:1px solid rgba(37,39,34,.08);
  border-radius:34px;
  background:rgba(248,247,242,.78);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.back{
  display:inline-flex;align-items:center;gap:8px;margin-bottom:54px;color:var(--muted);
  font-family:var(--serif);font-size:14px;text-decoration:none;border-bottom:1px solid rgba(116,117,104,.24);
  transition:.2s ease;
}
.back:hover{color:var(--charcoal);border-color:rgba(37,39,34,.42)}
h1{margin:0;color:var(--ink);font-size:clamp(52px,9vw,96px);line-height:.96;letter-spacing:0;font-weight:800}
.lead{
  margin:24px 0 0;max-width:520px;color:#626456;font-family:var(--serif);
  font-size:clamp(18px,2.4vw,24px);line-height:1.74;
}
.thanks-list{margin-top:clamp(52px,8vw,86px);display:grid;gap:18px}
.artist{
  display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;
  padding:24px 26px;border:1px solid rgba(37,39,34,.08);border-radius:24px;
  background:rgba(255,255,250,.46);box-shadow:0 14px 40px rgba(42,43,38,.07);
}
.artist-name{
  width:max-content;max-width:100%;color:var(--sage-dark);font-size:clamp(24px,4vw,38px);
  line-height:1.1;font-weight:800;text-decoration:none;border-bottom:2px solid rgba(102,115,95,.24);
  transition:.22s ease;
}
.artist-name:hover{color:var(--night);border-color:rgba(47,58,67,.44)}
.line{margin:10px 0 0;color:#626456;font-family:var(--serif);font-size:clamp(16px,2vw,20px);line-height:1.55}
.mark{
  width:54px;aspect-ratio:1/1;border-radius:50%;border:1px solid rgba(37,39,34,.1);
  background:
    linear-gradient(90deg,transparent 48%,rgba(47,58,67,.5) 48% 52%,transparent 52%),
    radial-gradient(circle at 50% 50%,rgba(169,182,156,.42) 0 28%,transparent 29%),
    rgba(238,238,231,.74);
  opacity:.72;
}
.artist:nth-child(2) .mark{
  border-radius:18px;background:
    linear-gradient(145deg,transparent 0 46%,rgba(47,58,67,.45) 47% 50%,transparent 51%),
    radial-gradient(circle at 30% 32%,rgba(169,182,156,.38) 0 17%,transparent 18%),
    radial-gradient(circle at 70% 70%,rgba(47,58,67,.16) 0 28%,transparent 29%),
    rgba(238,238,231,.74);
}
.note{margin:58px 0 0;max-width:520px;color:var(--muted);font-family:var(--serif);font-size:14px;line-height:1.8}
footer{margin-top:22px;color:var(--muted);font-family:var(--serif);font-size:13px;text-align:center}
@media(max-width:680px){
  .wrap{width:min(100% - 22px,920px);padding:24px 0 28px}
  .page{min-height:calc(100vh - 52px);padding:30px 24px;border-radius:28px}
  .back{margin-bottom:42px}
  .artist{grid-template-columns:1fr;padding:22px;gap:18px}
  .mark{width:46px;justify-self:end}
  .note{margin-top:42px}
}
</style>
</head>
<body>
<main class="wrap">
  <section class="page" aria-labelledby="thanksTitle">
    <a class="back" href="index.html">回到播放器</a>
    <h1 id="thanksTitle">Thanks.</h1>
    <p class="lead">Some people never met us.<br>But they still changed us.</p>

    <div class="thanks-list" aria-label="Acknowledgements">
      <article class="artist">
        <div>
          <a class="artist-name" href="https://music.apple.com/us/artist/ryuichi-sakamoto/271593168" target="_blank" rel="noreferrer">Ryuichi Sakamoto</a>
          <p class="line">Art is long, life is short</p>
        </div>
        <div class="mark" aria-hidden="true"></div>
      </article>

      <article class="artist">
        <div>
          <a class="artist-name" href="https://music.apple.com/us/artist/nujabes/679712483" target="_blank" rel="noreferrer">Nujabes</a>
          <p class="line">The soundtrack to your life.</p>
        </div>
        <div class="mark" aria-hidden="true"></div>
      </article>
    </div>

    <p class="note">This page is not a profile. It is only a small acknowledgement, left quietly at the edge of the site.</p>
  </section>
</main>
<footer>O's 日音播放器</footer>
</body>
</html>
